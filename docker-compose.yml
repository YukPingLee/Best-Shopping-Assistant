services:
  backend:
    build:
      context: ./backend
    container_name: best-shopping-assistant-backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    container_name: best-shopping-assistant-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
